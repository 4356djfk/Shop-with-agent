services:
  postgres:
    image: postgres:16-alpine
    container_name: aishop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aishop_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/aishop_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-aishop_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  db-init:
    image: postgres:16-alpine
    container_name: aishop-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - ./sql/aishop_postgres.sql:/sql/aishop_postgres.sql:ro
    command:
      - /bin/sh
      - -c
      - >
        psql -h postgres -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-aishop_db} -v ON_ERROR_STOP=1 -f /sql/aishop_postgres.sql
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: aishop-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aishop-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aishop_db}
      DB_USERNAME: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_TOKEN_TTL_DAYS: ${AUTH_TOKEN_TTL_DAYS:-7}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
