spring.application.name=AIshop-back
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aishop_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5s

spring.cache.type=redis
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=aishop:v3:
spring.cache.redis.cache-null-values=false

app.auth.token-ttl-days=${AUTH_TOKEN_TTL_DAYS:7}
app.monitor.enabled=${MONITOR_ENABLED:true}
app.monitor.port=${MONITOR_PORT:9000}
app.monitor.shared-secret=${MONITOR_SHARED_SECRET:change-me-dev-secret}
app.monitor.ws-allowed-origins=${MONITOR_WS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081}
app.monitor.ws-allow-anonymous-local=${MONITOR_WS_ALLOW_ANONYMOUS_LOCAL:true}
app.frontend.auto-start=${FRONTEND_AUTO_START:false}
app.frontend.dir=${FRONTEND_DIR:e:\\Code\\Vue\\b\\detect-end}
app.ai.enabled=${AI_ENABLED:true}
app.ai.provider=${AI_PROVIDER:coze}
app.ai.llm-primary-mode=${AI_LLM_PRIMARY_MODE:true}
app.ai.context-inherit-llm.enabled=${AI_CONTEXT_INHERIT_LLM_ENABLED:true}
app.ai.force-llm-every-turn=${AI_FORCE_LLM_EVERY_TURN:true}
app.ai.coze.base-url=${COZE_BASE_URL:http://127.0.0.1:5000}
app.ai.coze.chat-path=${COZE_CHAT_PATH:/run}
app.ai.coze.chat-model=${COZE_CHAT_MODEL:coze-agent}
app.ai.coze.api-key=${COZE_API_KEY:}
app.ai.coze.temperature=${COZE_TEMPERATURE:0.4}
app.ai.coze.max-history-turns=${COZE_MAX_HISTORY_TURNS:10}
app.ai.coze.timeout-millis=${COZE_TIMEOUT_MILLIS:300000}
app.ai.coze.retry-max-attempts=${COZE_RETRY_MAX_ATTEMPTS:3}
app.ai.coze.retry-base-backoff-millis=${COZE_RETRY_BASE_BACKOFF_MILLIS:800}
app.ai.coze.local-cart-fallback-enabled=${COZE_LOCAL_CART_FALLBACK_ENABLED:false}
app.ai.openai-api-key=${OPENAI_API_KEY:sk-GD56LBULM2EBizeRbsRopXzEBM0X2XH1QuS5X9JTJOVTpfCv}
app.ai.openai-base-url=${OPENAI_BASE_URL:https://api.190269.xyz/v1}
app.ai.openai-chat-api-key=${OPENAI_CHAT_API_KEY:sk-GD56LBULM2EBizeRbsRopXzEBM0X2XH1QuS5X9JTJOVTpfCv}
app.ai.openai-embedding-api-key=${OPENAI_EMBEDDING_API_KEY:ollama}
app.ai.openai-chat-base-url=${OPENAI_CHAT_BASE_URL:https://api.190269.xyz/v1}
app.ai.openai-embedding-base-url=${OPENAI_EMBEDDING_BASE_URL:http://localhost:11434/v1}
app.ai.chat-model=${OPENAI_CHAT_MODEL:gpt-5.2}
app.ai.embedding-model=${OPENAI_EMBEDDING_MODEL:nomic-embed-text}
app.ai.top-k=6
app.ai.rag.min-score=0.45
# Follow-up retrieval strategy toggles.
app.ai.followup.strict-no-repeat.enabled=${AGENT_FOLLOWUP_STRICT_NO_REPEAT_ENABLED:true}
app.ai.followup.relaxed-intent.enabled=${AGENT_FOLLOWUP_RELAXED_INTENT_ENABLED:true}
app.ai.es.enabled=${ES_ENABLED:true}
app.ai.es.host=${ES_HOST:localhost}
app.ai.es.port=${ES_PORT:9201}
app.ai.es.index=${ES_INDEX:products_search}
app.ai.es.username=${ES_USERNAME:}
app.ai.es.password=${ES_PASSWORD:}
app.ai.milvus.enabled=${AI_MILVUS_ENABLED:true}
app.ai.milvus.host=${AI_MILVUS_HOST:localhost}
app.ai.milvus.port=${AI_MILVUS_PORT:19530}
app.ai.milvus.collection=${AI_MILVUS_COLLECTION:products_rag_768}
app.ai.milvus.dimension=${AI_MILVUS_DIMENSION:768}

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl
